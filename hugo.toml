baseURL = 'https://zoetetal.github.io/titslam/'
locale = 'en-us'
title = 'TITSLAM'

disableKinds = ['taxonomy', 'term']

[params]
  description = 'A fan theory about the Scolopendra levels in the Dungeon Crawler Carl series by Matt Dinniman. Spoiler-protected analysis of the histories, mythology, and hidden metaphors behind the dungeon floors.'
  # Change this to switch spoiler color palettes.
  # Options: vibrant, muted, pastel, earth, neon, covers, covers_raw
  # See data/palettes.yaml to add your own.
  palette = 'covers'

[markup]
  [markup.goldmark]
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false
