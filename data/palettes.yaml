# Extracted from Ace Hardback cover art (Scott Wegner illustrations)
# Raw dominant colors - very vibrant/neon, true to the cover skulls
covers_raw:
  "0":  "#8a9bae"    # neutral steel
  "1":  "#fbc033"    # gold/yellow (DCC)
  "2":  "#ff00d7"    # hot magenta (CDS)
  "3":  "#ff2120"    # bright red (DAC)
  "4":  "#f5ff00"    # neon yellow (GotFG)
  "5":  "#00ff01"    # neon green (TBM)
  "6":  "#ff7f01"    # orange (EotBB)
  "7":  "#00ffc8"    # cyan/teal (TIR)
  "8":  "#ab158f"    # purple (APoH - secondary; primary red conflicts w/ book 3)
  "9":  "#3a7cff"    # blue (TBD - no cover yet)
  "10": "#8a9bae"    # muted steel (speculation)

# Cover-inspired but toned for readability as spoiler bars
covers:
