# Named color palettes for spoiler tags.
# Each palette maps book numbers (1-9) to colors.
# To switch palettes, change `palette` in hugo.toml params.
#
# Tips for choosing colors:
#   - Ensure sufficient contrast against both white and dark backgrounds
#   - Avoid colors too similar to each other (especially adjacent books)
#   - Test with the "Reveal All" button to check border-color readability

vibrant:
  "0":  "#95a5a6"    # silver
  "1":  "#e74c3c"    # red
  "2":  "#3498db"    # blue
  "3":  "#2ecc71"    # green
  "4":  "#9b59b6"    # purple
  "5":  "#e67e22"    # orange
  "6":  "#1abc9c"    # teal
  "7":  "#f1c40f"    # gold
  "8":  "#e91e99"    # magenta
  "9":  "#00bcd4"    # cyan
  "10": "#78909c"    # blue-grey

muted:
